name: PR Gates

# Per-PR validation gates:
#   * parse-gate   -- headless GDScript parse, fanned out across a configurable
#                     range of Godot versions (.github/godot-versions.json).
#   * build        -- native addon build against the DEFAULT GDK edition
#                     (.github/gdk-versions.json) + the C++ doctest, via the
#                     shared build-addons composite. Produces the build-pr
#                     artifact (addon DLLs + redist + mirrored test support).
#   * test-offline -- restores the build-pr artifact and runs the offline
#                     (non-live) tier -- GDExtension load/smoke + non-live GUT --
#                     against the single DEFAULT Godot version, via the shared
#                     run-offline-tier composite. No rebuild.
#   * fuzz-replay  -- builds the libFuzzer targets and replays their committed
#                     corpora (regression mode; no active fuzzing).
#   * csharp       -- (experimental/dotnet only) builds the managed C# facade
#                     libraries and runs the FacadeParity.Tests xUnit suite,
#                     asserting every native doc_classes member has a managed
#                     wrapper. Pure managed metadata -- no Godot binary, no
#                     native build, no secrets -> fork-safe.
#
# This file gates BOTH main and the experimental/dotnet branch (see `on:`).
# For a PR/push, GitHub uses the copy of this workflow on the *base* branch, so
# main events run main's copy (which has no csharp job), and experimental/dotnet
# events run this copy. The csharp job -- and tools/run_csharp_tests.ps1 + the
# *_csharp projects it drives -- exist only on experimental/dotnet, so the C#
# gate runs only for that branch while the GDScript/native/fuzz jobs revalidate
# the inherited surface there too.
#
# build / test-offline share their step logic with playfab-live-nightly.yml via
# the .github/actions/build-addons + run-offline-tier composites: the addons are
# built once per GDK edition and the build output is tested across Godot versions
# without rebuilding. The PR leg uses the default GDK + default Godot for the
# fastest signal; the nightly fans the same composites across the full matrix.
#
# PlayFab live tests are intentionally NOT here -- they run on a schedule /
# manual dispatch from playfab-live-nightly.yml so secrets never reach fork PRs.

on:
  pull_request:
    branches: [main, experimental/dotnet]
  push:
    branches: [main, experimental/dotnet]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Reads the supported Godot range + the default Godot / GDK editions once and
  # exposes them as job outputs: the parse gate fans out over `matrix`, while the
  # PR build + offline tier use the single defaults (fastest signal).
  versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
      default_godot: ${{ steps.read.outputs.default_godot }}
      default_gdk: ${{ steps.read.outputs.default_gdk }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - id: read
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(jq -c '.supported' .github/godot-versions.json)
          default_godot=$(jq -r '.default' .github/godot-versions.json)
          default_gdk=$(jq -r '.default' .github/gdk-versions.json)
          echo "Supported Godot versions: $matrix"
          echo "Default Godot: $default_godot ; default GDK edition: $default_gdk"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "default_godot=$default_godot" >> "$GITHUB_OUTPUT"
          echo "default_gdk=$default_gdk" >> "$GITHUB_OUTPUT"

  parse-gate:
    needs: versions
    runs-on: windows-latest
    name: parse-gate (${{ matrix.godot }})
    strategy:
      fail-fast: false
      matrix:
        godot: ${{ fromJSON(needs.versions.outputs.matrix) }}
    steps:
      # No submodules: an uninitialized third_party/Gut stays empty, so the
      # parse gate never enumerates vendored GUT .gd files.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Godot ${{ matrix.godot }}
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ matrix.godot }}
          flavor: console

      - name: GDScript parse gate
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\tools\check_gd_scripts_headless.ps1

  # Native addon build for PRs: the DEFAULT GDK edition only (fastest signal),
  # via the shared build-addons composite. Runs the C++ doctest once and uploads
  # the build-pr artifact that test-offline consumes -- no rebuild downstream.
  # windows-2022: the `default` CMake preset targets the VS2022 generator.
  build:
    needs: versions
    runs-on: windows-2022
    outputs:
      artifact_name: ${{ steps.build.outputs.artifact_name }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
          persist-credentials: false

      - name: Build addons (GDK ${{ needs.versions.outputs.default_gdk }}) + C++ doctest
        id: build
        uses: ./.github/actions/build-addons
        with:
          gdk_version: ${{ needs.versions.outputs.default_gdk }}
          artifact_name: build-pr

  # Offline (non-live) tier for PRs: restore the build-pr artifact and run the
  # GDExtension load/smoke + non-live GUT against the single DEFAULT Godot
  # version, via the shared run-offline-tier composite. No secrets -> fork-safe.
  test-offline:
    needs: [versions, build]
    runs-on: windows-2022
    steps:
      # No submodules: the GUT mirror + addon DLLs arrive via the build artifact.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Offline tier (Godot ${{ needs.versions.outputs.default_godot }})
        uses: ./.github/actions/run-offline-tier
        with:
          godot_version: ${{ needs.versions.outputs.default_godot }}
          artifact_name: ${{ needs.build.outputs.artifact_name }}
          run_summary_artifact: pr-offline-run-summary

  fuzz-replay:
    # Pinned to windows-2022: the fuzz preset uses the "Visual Studio 17 2022"
    # generator, but windows-latest now ships VS2026 (no VS2022 instance), which
    # makes `cmake --preset fuzz` fail at project() with "could not find any
    # instance of Visual Studio". windows-2022 carries VS2022 + the ClangCL
    # toolset the fuzz build needs.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
          persist-credentials: false

      - name: Configure (fuzz preset, ClangCL + ASan)
        shell: pwsh
        run: cmake --preset fuzz

      - name: Build fuzz targets
        shell: pwsh
        run: cmake --build build/fuzz --preset debug-fuzz

      - name: Replay committed corpora
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\tools\run_fuzz_replay.ps1

      - name: Upload libFuzzer crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: |
            crash-*
            leak-*
            timeout-*
            oom-*
          if-no-files-found: ignore

  # C# facade parity gate -- experimental/dotnet track only (see the header note
  # and `on:` above). Builds the three managed facade class libraries
  # (godot_gdk_csharp / godot_playfab_csharp / godot_gameinput_csharp) and runs
  # the FacadeParity.Tests xUnit suite, which reflects over the built assemblies
  # and asserts every native doc_classes member has a managed wrapper -- catching
  # C# facade drift as the native surface evolves. Pure managed metadata: it needs
  # only the .NET SDK (no Godot binary, no native/CMake build, no submodules, no
  # secrets), so it is fast and fork-safe. tools/run_csharp_tests.ps1 is the same
  # script used locally, so CI and local runs stay in lockstep.
  csharp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup .NET SDK 8.0
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '8.0.x'

      - name: C# facade build + parity tests
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\tools\run_csharp_tests.ps1
