name: PR Gates

# Per-PR validation gates:
#   * parse-gate  -- headless GDScript parse, fanned out across a configurable
#                    range of Godot versions (.github/godot-versions.json).
#   * fuzz-replay -- builds the libFuzzer targets and replays their committed
#                    corpora (regression mode; no active fuzzing).
#
# PlayFab live tests are intentionally NOT here -- they run on a schedule /
# manual dispatch from playfab-live-nightly.yml so secrets never reach fork PRs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Reads the supported Godot range once and exposes it as a matrix so the
  # parse gate fans out without hard-coding versions in the workflow.
  versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.read.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - id: read
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(jq -c '.supported' .github/godot-versions.json)
          echo "Supported Godot versions: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  parse-gate:
    needs: versions
    runs-on: windows-latest
    name: parse-gate (${{ matrix.godot }})
    strategy:
      fail-fast: false
      matrix:
        godot: ${{ fromJSON(needs.versions.outputs.matrix) }}
    steps:
      # No submodules: an uninitialized third_party/Gut stays empty, so the
      # parse gate never enumerates vendored GUT .gd files.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Setup Godot ${{ matrix.godot }}
        uses: ./.github/actions/setup-godot
        with:
          version: ${{ matrix.godot }}
          flavor: console

      - name: GDScript parse gate
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\tools\check_gd_scripts_headless.ps1

  fuzz-replay:
    # Pinned to windows-2022: the fuzz preset uses the "Visual Studio 17 2022"
    # generator, but windows-latest now ships VS2026 (no VS2022 instance), which
    # makes `cmake --preset fuzz` fail at project() with "could not find any
    # instance of Visual Studio". windows-2022 carries VS2022 + the ClangCL
    # toolset the fuzz build needs.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive
          persist-credentials: false

      - name: Configure (fuzz preset, ClangCL + ASan)
        shell: pwsh
        run: cmake --preset fuzz

      - name: Build fuzz targets
        shell: pwsh
        run: cmake --build build/fuzz --preset debug-fuzz

      - name: Replay committed corpora
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\tools\run_fuzz_replay.ps1

      - name: Upload libFuzzer crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: |
            crash-*
            leak-*
            timeout-*
            oom-*
          if-no-files-found: ignore
